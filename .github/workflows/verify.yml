name: Verify

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: main

  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: elves/setup-elvish@v1
        with:
          elvish-version: 0.21.0

      - shell: elvish {0}
        run: |
          use epm
          use os
          use path

          epm:install github.com/giancosta86/epm-plus

          use github.com/giancosta86/epm-plus/epm-plus

          epm-plus:patch-epm

          epm:install

          var link-path = (path:join $epm:managed-dir github.com giancosta86 astral-bridge v1)

          os:mkdir-all (path:dir $link-path)

          os:symlink '${{ github.workspace }}' $link-path

      - shell: elvish {0}
        run: |
          use os
          use github.com/giancosta86/astral-bridge/v1/tests/shared

          shared:-pre-install-versions > $os:dev-null 2>&1

      - shell: elvish {0}
        run: |
          use github.com/giancosta86/velvet/v3/velvet

          velvet:velvet &must-pass
